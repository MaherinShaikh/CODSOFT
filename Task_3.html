<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .calculator-wrapper {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 20px;
            width: 100%;
            max-width: 400px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .calculator-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .calculator-header h1 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .calculator-header p {
            color: #999;
            font-size: 0.9rem;
        }

        .display-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .previous-operand {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
            min-height: 24px;
            text-align: right;
            margin-bottom: 10px;
            word-wrap: break-word;
            word-break: break-all;
        }

        .current-operand {
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            text-align: right;
            min-height: 50px;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            word-wrap: break-word;
            word-break: break-all;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        button {
            padding: 20px;
            font-size: 1.3rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        button:active {
            transform: scale(0.95);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
        }

        /* Number buttons */
        .number-btn {
            background-color: #f5f5f5;
            color: #333;
        }

        .number-btn:hover {
            background-color: #e8e8e8;
        }

        /* Operation buttons */
        .operation-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .operation-btn:hover {
            filter: brightness(1.1);
        }

        .operation-btn.active {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.4);
        }

        /* Clear button */
        .clear-btn {
            background-color: #ff6b6b;
            color: white;
            grid-column: span 2;
        }

        .clear-btn:hover {
            background-color: #ff5252;
        }

        /* Delete button */
        .delete-btn {
            background-color: #ffa500;
            color: white;
            grid-column: span 2;
        }

        .delete-btn:hover {
            background-color: #ff9100;
        }

        /* Equals button */
        .equals-btn {
            background: linear-gradient(135deg, #00c853 0%, #00b248 100%);
            color: white;
            grid-column: span 4;
            font-size: 1.5rem;
        }

        .equals-btn:hover {
            filter: brightness(1.1);
        }

        .equals-btn:active {
            transform: scale(0.98);
        }

        /* Decimal button */
        .decimal-btn {
            background-color: #f5f5f5;
            color: #333;
        }

        .decimal-btn:hover {
            background-color: #e8e8e8;
        }

        /* History section */
        .history-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e8e8e8;
        }

        .history-title {
            color: #333;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .history-list {
            list-style: none;
            max-height: 150px;
            overflow-y: auto;
            background-color: #f9f9f9;
            border-radius: 8px;
            padding: 10px;
        }

        .history-item {
            padding: 8px;
            color: #666;
            font-size: 0.9rem;
            border-bottom: 1px solid #e8e8e8;
            cursor: pointer;
            transition: background-color 0.2s ease;
            word-break: break-all;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-item:hover {
            background-color: #e8e8e8;
            border-radius: 4px;
        }

        .history-empty {
            color: #999;
            font-size: 0.9rem;
            text-align: center;
            padding: 15px;
        }

        .clear-history-btn {
            width: 100%;
            padding: 10px;
            background-color: #f0f0f0;
            color: #666;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s ease;
        }

        .clear-history-btn:hover {
            background-color: #e0e0e0;
        }

        /* Scrollbar styling */
        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .history-list::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .calculator-wrapper {
                max-width: 100%;
                padding: 15px;
            }

            .calculator-header h1 {
                font-size: 1.5rem;
            }

            .current-operand {
                font-size: 2rem;
            }

            button {
                padding: 18px;
                font-size: 1.2rem;
            }

            .equals-btn {
                font-size: 1.3rem;
            }

            .history-section {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="calculator-wrapper">
        <!-- Header -->
        <div class="calculator-header">
            <h1>Calculator</h1>
            <p>Simple & Powerful</p>
        </div>

        <!-- Display -->
        <div class="display-container">
            <div class="previous-operand" id="previousOperand"></div>
            <div class="current-operand" id="currentOperand">0</div>
        </div>

        <!-- Buttons Grid -->
        <div class="button-grid">
            <!-- Row 1 -->
            <button class="clear-btn" onclick="calculator.clear()">C</button>
            <button class="delete-btn" onclick="calculator.delete()">DEL</button>

            <!-- Row 2 -->
            <button class="number-btn" onclick="calculator.addNumber('7')">7</button>
            <button class="number-btn" onclick="calculator.addNumber('8')">8</button>
            <button class="number-btn" onclick="calculator.addNumber('9')">9</button>
            <button class="operation-btn" onclick="calculator.chooseOperation('÷')">÷</button>

            <!-- Row 3 -->
            <button class="number-btn" onclick="calculator.addNumber('4')">4</button>
            <button class="number-btn" onclick="calculator.addNumber('5')">5</button>
            <button class="number-btn" onclick="calculator.addNumber('6')">6</button>
            <button class="operation-btn" onclick="calculator.chooseOperation('×')">×</button>

            <!-- Row 4 -->
            <button class="number-btn" onclick="calculator.addNumber('1')">1</button>
            <button class="number-btn" onclick="calculator.addNumber('2')">2</button>
            <button class="number-btn" onclick="calculator.addNumber('3')">3</button>
            <button class="operation-btn" onclick="calculator.chooseOperation('-')">-</button>

            <!-- Row 5 -->
            <button class="number-btn" onclick="calculator.addNumber('0')" style="grid-column: span 2;">0</button>
            <button class="decimal-btn" onclick="calculator.addNumber('.')">.</button>
            <button class="operation-btn" onclick="calculator.chooseOperation('+')">+</button>

            <!-- Row 6 -->
            <button class="equals-btn" onclick="calculator.compute()">=</button>
        </div>

        <!-- History Section -->
        <div class="history-section">
            <div class="history-title">Calculation History</div>
            <ul class="history-list" id="historyList">
                <li class="history-empty">No calculations yet</li>
            </ul>
            <button class="clear-history-btn" onclick="calculator.clearHistory()">Clear History</button>
        </div>
    </div>

    <script>
        class Calculator {
            constructor(previousOperandElement, currentOperandElement, historyElement) {
                this.previousOperandElement = previousOperandElement;
                this.currentOperandElement = currentOperandElement;
                this.historyElement = historyElement;
                this.clear();
                this.history = this.loadHistory();
                this.updateHistoryDisplay();
            }

            clear() {
                this.currentOperand = '';
                this.previousOperand = '';
                this.operation = undefined;
                this.updateDisplay();
            }

            delete() {
                // Remove last character from current operand
                this.currentOperand = this.currentOperand.toString().slice(0, -1);
                this.updateDisplay();
            }

            addNumber(number) {
                // Prevent multiple decimal points
                if (number === '.' && this.currentOperand.includes('.')) return;

                // Limit input length to prevent display overflow
                if (this.currentOperand.toString().length > 15) return;

                this.currentOperand = this.currentOperand.toString() + number.toString();
                this.updateDisplay();
            }

            chooseOperation(operation) {
                // If no current operand, do nothing
                if (this.currentOperand === '') return;

                // If there's a previous operand and operation, compute first
                if (this.previousOperand !== '') {
                    this.compute();
                }

                this.operation = operation;
                this.previousOperand = this.currentOperand;
                this.currentOperand = '';
                this.updateDisplay();
            }

            compute() {
                let computation;

                // Convert operands to numbers
                const prev = parseFloat(this.previousOperand);
                const current = parseFloat(this.currentOperand);

                // If either operand is missing, return without computing
                if (isNaN(prev) || isNaN(current)) return;

                // Switch statement for operations
                switch (this.operation) {
                    case '+':
                        computation = prev + current;
                        break;
                    case '-':
                        computation = prev - current;
                        break;
                    case '×':
                        computation = prev * current;
                        break;
                    case '÷':
                        // Prevent division by zero
                        if (current === 0) {
                            alert('Cannot divide by zero!');
                            this.clear();
                            return;
                        }
                        computation = prev / current;
                        break;
                    default:
                        return;
                }

                // Add to history
                const calculationString = `${this.formatNumber(prev)} ${this.operation} ${this.formatNumber(current)} = ${this.formatNumber(computation)}`;
                this.addToHistory(calculationString);

                // Round to prevent floating point errors
                this.currentOperand = Math.round(computation * 100000000) / 100000000;
                this.operation = undefined;
                this.previousOperand = '';
                this.updateDisplay();
            }

            formatNumber(number) {
                // Format number with proper decimal places and thousands separator
                const stringNumber = number.toString();
                const integerDigits = parseFloat(stringNumber.split('.')[0]);
                const decimalDigits = stringNumber.split('.')[1];
                let integerDisplay;

                if (isNaN(integerDigits)) {
                    integerDisplay = '';
                } else {
                    integerDisplay = integerDigits.toLocaleString('en', { maximumFractionDigits: 0 });
                }

                if (decimalDigits != null) {
                    return `${integerDisplay}.${decimalDigits}`;
                } else {
                    return integerDisplay;
                }
            }

            updateDisplay() {
                this.currentOperandElement.innerText = 
                    this.currentOperand === '' ? '0' : this.formatNumber(this.currentOperand);

                if (this.operation != null) {
                    this.previousOperandElement.innerText = 
                        `${this.formatNumber(this.previousOperand)} ${this.operation}`;
                } else {
                    this.previousOperandElement.innerText = '';
                }
            }

            addToHistory(calculation) {
                this.history.unshift(calculation);
                // Keep only last 20 calculations
                if (this.history.length > 20) {
                    this.history.pop();
                }
                this.saveHistory();
                this.updateHistoryDisplay();
            }

            updateHistoryDisplay() {
                const historyList = this.historyElement;

                if (this.history.length === 0) {
                    historyList.innerHTML = '<li class="history-empty">No calculations yet</li>';
                    return;
                }

                historyList.innerHTML = '';
                this.history.forEach((item, index) => {
                    const li = document.createElement('li');
                    li.className = 'history-item';
                    li.textContent = item;
                    li.onclick = () => this.restoreFromHistory(index);
                    historyList.appendChild(li);
                });
            }

            restoreFromHistory(index) {
                const calculation = this.history[index];
                // Extract the result from the history string
                const result = calculation.split('=')[1].trim();
                this.currentOperand = parseFloat(result);
                this.operation = undefined;
                this.previousOperand = '';
                this.updateDisplay();
            }

            clearHistory() {
                if (this.history.length === 0) return;
                if (confirm('Are you sure you want to clear all history?')) {
                    this.history = [];
                    this.saveHistory();
                    this.updateHistoryDisplay();
                }
            }

            saveHistory() {
                // Save history to localStorage
                localStorage.setItem('calculatorHistory', JSON.stringify(this.history));
            }

            loadHistory() {
                // Load history from localStorage
                const saved = localStorage.getItem('calculatorHistory');
                return saved ? JSON.parse(saved) : [];
            }
        }

        // Initialize calculator
        const previousOperandElement = document.getElementById('previousOperand');
        const currentOperandElement = document.getElementById('currentOperand');
        const historyElement = document.getElementById('historyList');

        const calculator = new Calculator(previousOperandElement, currentOperandElement, historyElement);

        // Keyboard support
        document.addEventListener('keydown', (event) => {
            if (event.key >= '0' && event.key <= '9') calculator.addNumber(event.key);
            if (event.key === '.') calculator.addNumber('.');
            if (event.key === '+') {
                event.preventDefault();
                calculator.chooseOperation('+');
            }
            if (event.key === '-') {
                event.preventDefault();
                calculator.chooseOperation('-');
            }
            if (event.key === '*') {
                event.preventDefault();
                calculator.chooseOperation('×');
            }
            if (event.key === '/') {
                event.preventDefault();
                calculator.chooseOperation('÷');
            }
            if (event.key === 'Enter') {
                event.preventDefault();
                calculator.compute();
            }
            if (event.key === 'Backspace') {
                event.preventDefault();
                calculator.delete();
            }
            if (event.key.toLowerCase() === 'c') {
                event.preventDefault();
                calculator.clear();
            }
        });
    </script>
</body>
</html>
